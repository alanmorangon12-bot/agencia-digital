version: '3.8'

services:
  postgres:
    image: postgres:15-alpine
    container_name: agencia_digital_db
    environment:
      POSTGRES_DB: agencia_digital
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: password
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./database/init.sql:/docker-entrypoint-initdb.d/init.sql
    networks:
      - agencia_network

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: agencia_digital_api
    ports:
      - "5000:5000"
    environment:
      NODE_ENV: development
      DB_HOST: postgres
      DB_PORT: 5432
      DB_NAME: agencia_digital
      DB_USER: postgres
      DB_PASSWORD: password
    depends_on:
      - postgres
    networks:
      - agencia_network
    volumes:
      - ./backend/src:/app/src

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: agencia_digital_web
    ports:
      - "3000:3000"
    environment:
      NEXT_PUBLIC_API_URL: http://localhost:5000/api
    depends_on:
      - backend
    networks:
      - agencia_network
    volumes:
      - ./frontend:/app

volumes:
  postgres_data:

networks:
  agencia_network:
    driver: bridge
